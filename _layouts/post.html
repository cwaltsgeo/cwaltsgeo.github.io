---
layout: default
---
<a href="{{ "/" | absolute_url }}"><i style="font-size:24px" class="fa">&#xf177;</i> Back</a><br>

<h1>{{ page.title }}</h1>
<small>{{ page.date | date: "%-d %B %Y" }}</small>

<p class="view">by {{ page.author | default: site.author }}</p>
<ul class="downloads">
  <li><a href="{{ page.repo }}">View On <strong>GitHub</strong></a></li>
</ul>
{{content}}

{% if page.tags %}
  <small>tags: <em>{{ page.tags | join: "</em> - <em>" }}</em></small>
{% endif %}
